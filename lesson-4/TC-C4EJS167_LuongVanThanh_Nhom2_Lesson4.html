<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luong Van Thanh</title>
    <link rel="stylesheet" href="./mystyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="nav">
      <!-- hinh logo -->
      <div class="logo">
        <img src="./Logo.svg"/>
      </div>
      <!-- noi dung menu -->
      <div class="menu">
        <div>About us</div>
        <div class="sub-menu">
          Our Class
          <i class="fa-solid fa-chevron-down"></i>
          <div class="sub-menu-item">
            <div>Class 1</div>
            <div>Class 2</div>
          </div>
        </div>
        <div>Blog</div>
        <div>Contact</div>
      </div>
      <!-- Search -->
      <div class="search">
        <img src="./ShoppingBag.svg"/>
        <input id="search" name="search" type="text" placeholder="Search" />
      </div>
    </div>
    <div class="main">
      <div class="left">
        <div class="bold">Master Digital Skills with Ease!</div>
        <div class="text">
          Unlock Digital Mastery Effortlessly! Explore and enhance your skills
          with our user-friendly platform.
        </div>
        <div class="content">
        <div class="students-card">
            <h4>Total students</h4>
            <div class="stats">
                <div class="avatar-stack">
                    <img src="./837ca36c1ac55e580e0ef5d7db92fccc7e01d083.jpg" alt="Student 1">
                    <img src="./837ca36c1ac55e580e0ef5d7db92fccc7e01d083.jpg" alt="Student 2">
                    <img src="./837ca36c1ac55e580e0ef5d7db92fccc7e01d083.jpg" alt="Student 3">
                    <img src="./837ca36c1ac55e580e0ef5d7db92fccc7e01d083.jpg" alt="Student 4">
                </div>
                <div class="badge">900+</div>
            </div>
        </div>
    </div>
        <div class="button">
         <input type="button" value="Start learning">
         <input type="button" value="Learn more">
        </div>

        <div class="brand">
          <div>Trusted by</div>
          <img src="./Google Logotype.svg"/>
          <img src="./Canva Logotype.svg"/>
          <img src="./Amazon Logotype.svg"/>
          <img src="./Sketch Logotype.svg"/>
        </div>
      </div>
      <div class="right">
        <img src="./0d812b90816c399a7d8c9fb36865038c861f4244.jpg" />

        <div class="box">
        <div class="bold">Certified Instructor</div>
        <div class="item">
          <img
            class="image"
            src="./fb23940e57a2e53c8114147f91536435dbb4a14b.jpg"
          />
          <div class="content">
            <div class="name bold">Donald Robert</div>
            <div class="text skill">UI/UX Design</div>
          </div>
        </div>
        <div class="item">
          <img
            class="image"
            src="./057c5037d6bf0fcc380ab5e47363209a46b2e3a5.jpg"
          />
          <div class="content">
            <div class="name bold">John White</div>
            <div class="text skill">Web Development</div>
          </div>
        </div>
      </div>
      </div>
    </div>
  </body>
</html>
